services:

  # ── Database ──────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: inventory-postgres
    restart: always
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventorydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Spring Boot) ─────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: inventory-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Override application.properties — service name replaces localhost
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      JWT_SECRET: change-this-secret-key-please-use-a-longer-secret-key-1234567890
      JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (React → nginx) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Browser-visible URL — must be reachable from the user's machine
        VITE_API_URL: http://localhost:8080/api
    container_name: inventory-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
